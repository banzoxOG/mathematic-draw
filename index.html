<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Math Visualizer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/12.4.2/math.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: rgba(255,255,255,0.09);
    --border2: rgba(255,255,255,0.18);
    --text: #e8eaf0;
    --muted: #7b82a0;
    --accent: #4f9cff;
    --accent2: #2dd4a0;
    --danger: #ff6b6b;
    --radius: 10px;
    --radius-sm: 6px;
  }

  body {
    font-family: 'Courier New', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  /* HEADER */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 28px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .logo {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  header h1 { font-size: 18px; font-weight: 600; letter-spacing: 0.02em; }
  header span { font-size: 12px; color: var(--muted); margin-left: 4px; }

  /* LAYOUT */
  .app { display: flex; height: calc(100vh - 69px); }

  /* SIDEBAR */
  .sidebar {
    width: 340px;
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .tab {
    flex: 1;
    padding: 13px;
    background: none;
    border: none;
    color: var(--muted);
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .panel { display: none; flex-direction: column; flex: 1; overflow-y: auto; padding: 16px; gap: 12px; }
  .panel.active { display: flex; }

  /* SCROLLBAR */
  .panel::-webkit-scrollbar { width: 4px; }
  .panel::-webkit-scrollbar-track { background: transparent; }
  .panel::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

  /* INPUT ROW */
  .input-row { display: flex; gap: 8px; }
  .input-row input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    padding: 9px 12px;
    outline: none;
    transition: border-color 0.15s;
  }
  .input-row input:focus { border-color: var(--accent); }
  .input-row input::placeholder { color: var(--muted); }

  button {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    padding: 8px 14px;
    cursor: pointer;
    transition: all 0.12s;
    white-space: nowrap;
  }
  button:hover { border-color: var(--accent); color: var(--accent); }
  button:active { transform: scale(0.97); }
  button.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 600;
  }
  button.primary:hover { opacity: 0.88; color: #fff; }

  .error { font-size: 12px; color: var(--danger); min-height: 16px; }

  /* KEYBOARD */
  .kb { display: flex; flex-direction: column; gap: 6px; }
  .kb-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 4px; }
  .kb-row { display: flex; gap: 5px; flex-wrap: wrap; }
  .k {
    flex: 1;
    min-width: 36px;
    padding: 7px 4px;
    font-size: 12px;
    font-family: inherit;
    text-align: center;
    background: var(--bg);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    color: var(--text);
    cursor: pointer;
    transition: all 0.1s;
  }
  .k:hover { background: var(--surface2); border-color: var(--accent); color: var(--accent); }
  .k:active { transform: scale(0.94); }
  .k.fn { color: #a78bfa; border-color: rgba(167,139,250,0.25); }
  .k.fn:hover { color: #a78bfa; border-color: #a78bfa; background: rgba(167,139,250,0.08); }
  .k.trig { color: var(--accent2); border-color: rgba(45,212,160,0.25); }
  .k.trig:hover { color: var(--accent2); border-color: var(--accent2); background: rgba(45,212,160,0.08); }
  .k.wide { flex: 2; }
  .k.del { color: var(--danger); border-color: rgba(255,107,107,0.25); }
  .k.del:hover { color: var(--danger); border-color: var(--danger); background: rgba(255,107,107,0.08); }
  .k.example { color: var(--accent); font-size: 11px; }

  /* CURVES */
  .curves { display: flex; flex-direction: column; gap: 6px; }
  .curve-item {
    display: flex; align-items: center; gap: 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 7px 10px;
  }
  .curve-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .curve-expr { flex: 1; font-size: 13px; color: var(--text); }
  .curve-rm { background: none; border: none; color: var(--muted); font-size: 16px; padding: 0 2px; cursor: pointer; }
  .curve-rm:hover { color: var(--danger); border: none; transform: none; }

  /* ZOOM BAR */
  .zoom-bar {
    display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 8px 10px;
    font-size: 12px; color: var(--muted);
  }
  .zoom-bar input {
    width: 58px;
    background: var(--bg);
    border: 1px solid var(--border2);
    border-radius: 4px;
    color: var(--text);
    font-family: inherit;
    font-size: 12px;
    padding: 4px 6px;
    outline: none;
  }
  .zoom-bar input:focus { border-color: var(--accent); }
  .zbtn {
    padding: 4px 10px; font-size: 13px;
    background: var(--bg); border: 1px solid var(--border2);
    border-radius: 4px; color: var(--muted); cursor: pointer;
  }
  .zbtn:hover { border-color: var(--accent); color: var(--accent); }

  /* MAIN CANVAS AREA */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: var(--bg);
    overflow: hidden;
  }
  .canvas-wrap { flex: 1; position: relative; }
  canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: block; }
  .canvas-info {
    padding: 8px 16px;
    font-size: 11px;
    color: var(--muted);
    border-top: 1px solid var(--border);
    background: var(--surface);
    text-align: center;
    font-family: inherit;
  }

  /* IMAGE PANEL */
  .upload-zone {
    border: 1.5px dashed var(--border2);
    border-radius: var(--radius);
    padding: 32px 20px;
    text-align: center;
    cursor: pointer;
    color: var(--muted);
    font-size: 13px;
    transition: all 0.15s;
  }
  .upload-zone:hover, .upload-zone.drag { border-color: var(--accent); background: rgba(79,156,255,0.05); }
  .upload-zone.has-image { padding: 0; overflow: hidden; }
  .upload-zone img { width: 100%; border-radius: var(--radius); display: block; max-height: 260px; object-fit: contain; background: var(--surface2); }
  .upload-icon { font-size: 28px; margin-bottom: 10px; }

  .result-box {
    background: var(--bg);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 12px;
    font-size: 13px;
    line-height: 1.7;
    color: var(--text);
    white-space: pre-wrap;
    min-height: 50px;
  }
  .result-box.loading { color: var(--muted); font-style: italic; }
  .math-block {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 4px;
    padding: 2px 8px;
    display: inline-block;
    color: var(--accent2);
    font-size: 13px;
  }

  /* SECTION LABEL */
  .sec-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }

  /* RESPONSIVE */
  @media (max-width: 700px) {
    .app { flex-direction: column; height: auto; }
    .sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--border); }
    .main { height: 50vh; min-height: 300px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">∑</div>
  <div>
    <h1>Math Visualizer <span>— graph &amp; analyze</span></h1>
  </div>
</header>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('plot')">📈 Plot</button>
      <button class="tab" onclick="switchTab('image')">🖼 Image → Math</button>
    </div>

    <!-- PLOT PANEL -->
    <div id="panel-plot" class="panel active">

      <div class="input-row">
        <input type="text" id="expr-input" placeholder="e.g. sin(x), x^2…" onkeydown="if(event.key==='Enter')addCurve()" />
        <button class="primary" onclick="addCurve()">Plot</button>
      </div>
      <div class="error" id="expr-error"></div>

      <!-- KEYBOARD -->
      <div class="kb">
        <div class="kb-label">Numbers &amp; operators</div>
        <div class="kb-row">
          <button class="k" onclick="ins('7')">7</button>
          <button class="k" onclick="ins('8')">8</button>
          <button class="k" onclick="ins('9')">9</button>
          <button class="k" onclick="ins('/')">÷</button>
          <button class="k" onclick="ins('*')">×</button>
          <button class="k fn" onclick="ins('^')">xʸ</button>
          <button class="k fn" onclick="ins('sqrt(')">√</button>
          <button class="k del wide" onclick="delChar()">⌫</button>
        </div>
        <div class="kb-row">
          <button class="k" onclick="ins('4')">4</button>
          <button class="k" onclick="ins('5')">5</button>
          <button class="k" onclick="ins('6')">6</button>
          <button class="k" onclick="ins('+')">+</button>
          <button class="k" onclick="ins('-')">−</button>
          <button class="k fn" onclick="ins('(')">(</button>
          <button class="k fn" onclick="ins(')')">)</button>
          <button class="k fn wide" onclick="ins('x')">x</button>
        </div>
        <div class="kb-row">
          <button class="k" onclick="ins('1')">1</button>
          <button class="k" onclick="ins('2')">2</button>
          <button class="k" onclick="ins('3')">3</button>
          <button class="k" onclick="ins('0')">0</button>
          <button class="k" onclick="ins('.')">.</button>
          <button class="k fn" onclick="ins('pi')">π</button>
          <button class="k fn" onclick="ins('e')">e</button>
          <button class="k fn wide" onclick="ins('abs(')">|x|</button>
        </div>

        <div class="kb-label">Trigonometry</div>
        <div class="kb-row">
          <button class="k trig" onclick="ins('sin(')">sin</button>
          <button class="k trig" onclick="ins('cos(')">cos</button>
          <button class="k trig" onclick="ins('tan(')">tan</button>
          <button class="k trig" onclick="ins('asin(')">asin</button>
          <button class="k trig" onclick="ins('acos(')">acos</button>
          <button class="k trig" onclick="ins('atan(')">atan</button>
          <button class="k trig" onclick="ins('cot(')">cot</button>
        </div>

        <div class="kb-label">Powers &amp; Logs</div>
        <div class="kb-row">
          <button class="k fn" onclick="ins('exp(')">eˣ</button>
          <button class="k fn" onclick="ins('log(')">log₁₀</button>
          <button class="k fn" onclick="ins('log2(')">log₂</button>
          <button class="k fn" onclick="ins('ln(')">ln</button>
          <button class="k fn" onclick="ins('x^2')">x²</button>
          <button class="k fn" onclick="ins('x^3')">x³</button>
          <button class="k fn" onclick="ins('1/x')">1/x</button>
        </div>

        <div class="kb-label">Other</div>
        <div class="kb-row">
          <button class="k fn" onclick="ins('floor(')">floor</button>
          <button class="k fn" onclick="ins('ceil(')">ceil</button>
          <button class="k fn" onclick="ins('round(')">round</button>
          <button class="k fn" onclick="ins('sign(')">sign</button>
          <button class="k fn" onclick="ins('mod(x,')">mod</button>
          <button class="k fn" onclick="ins('cbrt(')">∛</button>
          <button class="k del wide" onclick="clearAll()">Clear</button>
        </div>

        <div class="kb-label">Quick examples</div>
        <div class="kb-row">
          <button class="k example wide" onclick="setEx('sin(x)')">sin(x)</button>
          <button class="k example wide" onclick="setEx('x^2 - 4')">x²−4</button>
          <button class="k example wide" onclick="setEx('exp(-x^2)')">e^−x²</button>
        </div>
        <div class="kb-row">
          <button class="k example wide" onclick="setEx('1/x')">1/x</button>
          <button class="k example wide" onclick="setEx('tan(x)')">tan(x)</button>
          <button class="k example wide" onclick="setEx('sqrt(abs(x))')">√|x|</button>
        </div>
        <div class="kb-row">
          <button class="k example wide" onclick="setEx('sin(x)*cos(x)')">sin·cos</button>
          <button class="k example wide" onclick="setEx('floor(x)')">floor(x)</button>
          <button class="k example wide" onclick="setEx('x^3 - 3*x')">x³−3x</button>
        </div>
      </div>

      <!-- CURVES -->
      <div class="sec-label">Active curves</div>
      <div class="curves" id="curves-list">
        <div style="font-size:12px;color:var(--muted);">No curves yet — add one above.</div>
      </div>

      <!-- ZOOM -->
      <div class="sec-label">View range</div>
      <div class="zoom-bar">
        <span>x:</span>
        <input type="number" id="xmin" value="-10" onchange="draw()" />
        <span>to</span>
        <input type="number" id="xmax" value="10" onchange="draw()" />
        <button class="zbtn" onclick="zoom(0.6)" title="Zoom in">+</button>
        <button class="zbtn" onclick="zoom(1.67)" title="Zoom out">−</button>
        <button class="zbtn" onclick="resetView()">Reset</button>
      </div>

    </div><!-- end plot panel -->

    <!-- IMAGE PANEL -->
    <div id="panel-image" class="panel">
      <div class="upload-zone" id="upload-zone"
           onclick="document.getElementById('file-inp').click()"
           ondragover="event.preventDefault();this.classList.add('drag')"
           ondragleave="this.classList.remove('drag')"
           ondrop="handleDrop(event)">
        <div id="upload-hint">
          <div class="upload-icon">📷</div>
          <div style="color:var(--text);font-weight:600;margin-bottom:6px;">Drop an image here</div>
          <div>or click to upload</div>
          <div style="margin-top:8px;font-size:11px;">equations · graphs · diagrams · formulas</div>
        </div>
        <img id="img-preview" style="display:none;" />
      </div>
      <input type="file" id="file-inp" accept="image/*" style="display:none;" onchange="loadImage(event)" />

      <button class="primary" id="analyze-btn" onclick="analyzeImage()" style="display:none;width:100%;">🔍 Analyze image</button>

      <div id="result-box" class="result-box" style="display:none;"></div>

      <div id="send-to-plot" style="display:none;">
        <button onclick="sendToPlot()" style="width:100%;color:var(--accent2);border-color:rgba(45,212,160,0.35);">
          ↗ Plot detected expression
        </button>
      </div>
    </div><!-- end image panel -->

  </div><!-- end sidebar -->

  <!-- MAIN GRAPH AREA -->
  <div class="main">
    <div class="canvas-wrap">
      <canvas id="graph"></canvas>
    </div>
    <div class="canvas-info" id="axis-info">Add a function to get started</div>
  </div>

</div><!-- end app -->

<script>
const COLORS = ['#4f9cff','#2dd4a0','#ff8c5a','#a78bfa','#fb7185','#fbbf24','#f87171','#34d399'];
let curves = [];
let imgBase64 = null;
let lastExpr = null;

/* ── INPUT HELPERS ── */
function inp() { return document.getElementById('expr-input'); }

function ins(s) {
  const el = inp();
  const st = el.selectionStart, en = el.selectionEnd;
  el.value = el.value.slice(0, st) + s + el.value.slice(en);
  const p = st + s.length;
  el.focus(); el.setSelectionRange(p, p);
}

function delChar() {
  const el = inp();
  const st = el.selectionStart, en = el.selectionEnd;
  if (st !== en) { ins(''); return; }
  if (st === 0) return;
  el.value = el.value.slice(0, st - 1) + el.value.slice(st);
  el.focus(); el.setSelectionRange(st - 1, st - 1);
}

function clearAll() { inp().value = ''; inp().focus(); }
function setEx(s) { inp().value = s; inp().focus(); document.getElementById('expr-error').textContent = ''; }

/* ── TABS ── */
function switchTab(t) {
  document.querySelectorAll('.tab').forEach((b, i) =>
    b.classList.toggle('active', (i === 0 && t === 'plot') || (i === 1 && t === 'image')));
  document.getElementById('panel-plot').classList.toggle('active', t === 'plot');
  document.getElementById('panel-image').classList.toggle('active', t === 'image');
}

/* ── CURVES ── */
function addCurve() {
  const el = inp(), err = document.getElementById('expr-error');
  const expr = el.value.trim();
  if (!expr) return;
  try {
    math.evaluate(expr.replace(/\bx\b/g, '(1)'));
    curves.push({ expr, color: COLORS[curves.length % COLORS.length] });
    renderList(); draw();
    el.value = ''; err.textContent = '';
  } catch(e) {
    err.textContent = '⚠ ' + e.message.split('\n')[0];
  }
}

function removeCurve(i) { curves.splice(i, 1); renderList(); draw(); }

function renderList() {
  const el = document.getElementById('curves-list');
  if (!curves.length) {
    el.innerHTML = '<div style="font-size:12px;color:var(--muted);">No curves yet — add one above.</div>';
    return;
  }
  el.innerHTML = curves.map((c, i) => `
    <div class="curve-item">
      <div class="curve-dot" style="background:${c.color}"></div>
      <span class="curve-expr">${c.expr}</span>
      <button class="curve-rm" onclick="removeCurve(${i})">×</button>
    </div>`).join('');
}

/* ── ZOOM ── */
function getRange() {
  return {
    xmin: parseFloat(document.getElementById('xmin').value) || -10,
    xmax: parseFloat(document.getElementById('xmax').value) || 10
  };
}
function zoom(f) {
  const { xmin, xmax } = getRange();
  const cx = (xmin + xmax) / 2, h = (xmax - xmin) / 2 * f;
  document.getElementById('xmin').value = (cx - h).toFixed(2);
  document.getElementById('xmax').value = (cx + h).toFixed(2);
  draw();
}
function resetView() {
  document.getElementById('xmin').value = -10;
  document.getElementById('xmax').value = 10;
  draw();
}

/* ── DRAW ── */
function draw() {
  const canvas = document.getElementById('graph');
  const DPR = window.devicePixelRatio || 1;
  const CW = canvas.offsetWidth, CH = canvas.offsetHeight;
  if (!CW || !CH) return;
  canvas.width = CW * DPR; canvas.height = CH * DPR;
  const ctx = canvas.getContext('2d');
  ctx.scale(DPR, DPR);

  const { xmin, xmax } = getRange();
  const N = CW * 2;
  const xs = Array.from({ length: N }, (_, i) => xmin + (xmax - xmin) * i / N);

  const allY = curves.flatMap(c =>
    xs.map(x => { try { const v = math.evaluate(c.expr, { x }); return isFinite(v) ? v : NaN; } catch { return NaN; } })
  ).filter(isFinite);
  let yl = allY.length ? Math.min(...allY) : -10;
  let yh = allY.length ? Math.max(...allY) : 10;
  const pad = Math.max((yh - yl) * 0.12, 0.5);
  yl -= pad; yh += pad;
  if (yl === yh) { yl -= 1; yh += 1; }

  const toX = v => (v - xmin) / (xmax - xmin) * CW;
  const toY = v => CH - (v - yl) / (yh - yl) * CH;

  /* background */
  ctx.fillStyle = '#0f1117';
  ctx.fillRect(0, 0, CW, CH);

  /* grid */
  const xT = niceStep(xmin, xmax, 8), yT = niceStep(yl, yh, 6);
  ctx.strokeStyle = 'rgba(255,255,255,0.05)'; ctx.lineWidth = 1;
  for (let t = Math.ceil(xmin / xT) * xT; t <= xmax; t = +(t + xT).toFixed(12)) {
    const px = toX(t); ctx.beginPath(); ctx.moveTo(px, 0); ctx.lineTo(px, CH); ctx.stroke();
  }
  for (let t = Math.ceil(yl / yT) * yT; t <= yh; t = +(t + yT).toFixed(12)) {
    const py = toY(t); ctx.beginPath(); ctx.moveTo(0, py); ctx.lineTo(CW, py); ctx.stroke();
  }

  /* axes */
  const x0 = toX(0), y0 = toY(0);
  ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 1.5;
  if (x0 >= 0 && x0 <= CW) { ctx.beginPath(); ctx.moveTo(x0, 0); ctx.lineTo(x0, CH); ctx.stroke(); }
  if (y0 >= 0 && y0 <= CH) { ctx.beginPath(); ctx.moveTo(0, y0); ctx.lineTo(CW, y0); ctx.stroke(); }

  /* labels */
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.font = '10px monospace';
  ctx.textAlign = 'center';
  for (let t = Math.ceil(xmin / xT) * xT; t <= xmax; t = +(t + xT).toFixed(12)) {
    if (Math.abs(t) < xT * 0.01) continue;
    ctx.fillText(fmt(t), toX(t), Math.min(CH - 4, Math.max(14, y0 + 14)));
  }
  ctx.textAlign = 'right';
  for (let t = Math.ceil(yl / yT) * yT; t <= yh; t = +(t + yT).toFixed(12)) {
    if (Math.abs(t) < yT * 0.01) continue;
    ctx.fillText(fmt(t), Math.min(CW - 4, Math.max(36, x0 - 6)), toY(t) + 4);
  }

  /* curves */
  curves.forEach(c => {
    ctx.strokeStyle = c.color; ctx.lineWidth = 2.5;
    ctx.lineJoin = 'round'; ctx.lineCap = 'round';
    ctx.beginPath();
    let started = false;
    for (let i = 0; i < xs.length; i++) {
      let y;
      try { y = math.evaluate(c.expr, { x: xs[i] }); } catch { started = false; continue; }
      if (!isFinite(y)) { started = false; continue; }
      const px = toX(xs[i]), py = toY(y);
      if (!started) { ctx.moveTo(px, py); started = true; } else { ctx.lineTo(px, py); }
    }
    ctx.stroke();
  });

  /* empty state */
  if (!curves.length) {
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.font = '14px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('Type a function and press Plot  ↙', CW / 2, CH / 2);
  }

  document.getElementById('axis-info').textContent =
    `x ∈ [${fmt(xmin)}, ${fmt(xmax)}]   ·   y ∈ [${fmt(yl.toFixed(2))}, ${fmt(yh.toFixed(2))}]`;
}

function niceStep(mn, mx, n) {
  const r = (mx - mn) / n, m = Math.pow(10, Math.floor(Math.log10(r)));
  for (const f of [1, 2, 2.5, 5, 10]) if (m * f >= r) return m * f;
  return m * 10;
}
function fmt(n) {
  const v = parseFloat(n);
  if (Math.abs(v) >= 10000 || (Math.abs(v) < 0.01 && v !== 0)) return v.toExponential(1);
  return parseFloat(v.toPrecision(4)).toString();
}

/* ── IMAGE ── */
function handleDrop(e) {
  e.preventDefault();
  document.getElementById('upload-zone').classList.remove('drag');
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('image/')) readFile(f);
}
function loadImage(e) { readFile(e.target.files[0]); }
function readFile(file) {
  const r = new FileReader();
  r.onload = ev => {
    imgBase64 = ev.target.result.split(',')[1];
    document.getElementById('upload-hint').style.display = 'none';
    const img = document.getElementById('img-preview');
    img.src = ev.target.result; img.style.display = 'block';
    document.getElementById('upload-zone').classList.add('has-image');
    document.getElementById('analyze-btn').style.display = 'block';
    document.getElementById('result-box').style.display = 'none';
    document.getElementById('send-to-plot').style.display = 'none';
    lastExpr = null;
  };
  r.readAsDataURL(file);
}

async function analyzeImage() {
  if (!imgBase64) return;
  const btn = document.getElementById('analyze-btn');
  const box = document.getElementById('result-box');
  btn.disabled = true; btn.textContent = '⏳ Analyzing…';
  box.style.display = 'block'; box.className = 'result-box loading';
  box.textContent = 'Reading the math in your image…';
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: `You are a math expert. When given an image:
1. Identify ALL mathematical content: equations, expressions, functions, diagrams, graphs, geometric shapes, formulas.
2. Write out each equation/expression clearly.
3. If there is a function that can be plotted (like y=f(x)), extract it and put it on its own line starting with "PLOTTABLE: " followed by the expression in math.js syntax (e.g. sin(x), x^2+2*x-3, exp(-x^2)).
4. Briefly explain what the math represents.
Be concise and clear. Use plain text only, no LaTeX.`,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: imgBase64 } },
            { type: 'text', text: 'What mathematical content is in this image? Extract all equations and functions.' }
          ]
        }]
      })
    });
    const data = await res.json();
    const text = data.content?.map(b => b.text || '').join('') || 'No response received.';
    box.className = 'result-box';
    let html = '';
    text.split('\n').forEach(line => {
      if (line.startsWith('PLOTTABLE:')) {
        const expr = line.replace('PLOTTABLE:', '').trim();
        lastExpr = expr;
        html += `<div style="margin:5px 0;"><span style="font-size:11px;color:var(--muted);">plottable: </span><span class="math-block">${expr}</span></div>`;
      } else {
        html += `<div>${line}</div>`;
      }
    });
    box.innerHTML = html;
    if (lastExpr) document.getElementById('send-to-plot').style.display = 'block';
  } catch(e) {
    box.className = 'result-box';
    box.textContent = '❌ Error: ' + e.message;
  }
  btn.disabled = false; btn.textContent = '🔍 Analyze again';
}

function sendToPlot() {
  if (!lastExpr) return;
  switchTab('plot');
  inp().value = lastExpr;
  addCurve();
}

/* ── INIT ── */
window.addEventListener('load', () => { draw(); });
window.addEventListener('resize', () => { draw(); });
</script>
